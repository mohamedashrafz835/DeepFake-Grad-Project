version: "3.9"

services:

  # ─────────────────────────────────────────
  # Frontend  (React / HTML static site)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"          # adjust if your frontend runs on a different port
    depends_on:
      - api-gateway
    networks:
      - my-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # API Gateway  (Flask / FastAPI)
  # ─────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8600:8000"        # adjust to whatever port your gateway exposes
    environment:
      - TEXT_SERVICE_URL=http://text-service:8000
      - IMAGE_SERVICE_URL=http://image-service:8000
    depends_on:
      - text-service
      - image-service
    networks:
      - my-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Text Service  (NLP / BERT model)
  # ─────────────────────────────────────────
  text-service:
    build:
      context: ./Text_Service
      dockerfile: Dockerfile
    container_name: text-service
    ports:
      - "8500:8000"        # adjust to the port your text service listens on
    networks:
      - my-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Image Service  (CV / deep-learning model)
  # ─────────────────────────────────────────
  image-service:
    build:
      context: ./Image_service
      dockerfile: Dockerfile
    container_name: image-service
    ports:
      - "8000:8000"        # adjust to the port your image service listens on
    networks:
      - my-network
    restart: unless-stopped

# ─────────────────────────────────────────
# Shared network — containers talk by name
# ─────────────────────────────────────────
networks:
  my-network:
    driver: bridge

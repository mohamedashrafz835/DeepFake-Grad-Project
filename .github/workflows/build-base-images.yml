name: CI — Build & Push Base Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/base/**'
      - '**/requirements.txt'

env:
  AWS_REGION: us-east-1

jobs:
  build-base:
    name: Build Base ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: image-service
          - service: text-service
          - service: api-gateway
          - service: frontend
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          REPO="deepfake-base/${{ matrix.service }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          # We'll use a fixed tag "base-latest" for the service builds to reference
          echo "image=${REGISTRY}/${REPO}" >> $GITHUB_OUTPUT
          echo "tag=${SHORT_SHA}"          >> $GITHUB_OUTPUT
          echo "full=${REGISTRY}/${REPO}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "latest=${REGISTRY}/${REPO}:base-latest" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -f docker/base/${{ matrix.service }}/Dockerfile \
            -t "${{ steps.meta.outputs.full }}" \
            -t "${{ steps.meta.outputs.latest }}" \
            .

      - name: Push Docker image to ECR
        run: |
          docker push "${{ steps.meta.outputs.full }}"
          docker push "${{ steps.meta.outputs.latest }}"
          echo "✅ Pushed base ${{ matrix.service }}:${{ steps.meta.outputs.tag }} → ECR"

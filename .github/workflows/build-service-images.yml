name: CI — Build & Push Service Images

on:
  push:
    branches: [main]
    paths:
      - 'Image_service/**'
      - 'Text_Service/**'
      - 'api-gateway/**'
      - 'Frontend/**'
      - 'docker/services/**'
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: frontend
            context: ./Frontend
          - name: api-gateway
            context: ./api-gateway
          - name: text-service
            context: ./Text_Service
          - name: image-service
            context: ./Image_service

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          REPO="deepfake/${{ matrix.service.name }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT
          echo "image=${REGISTRY}/${REPO}" >> $GITHUB_OUTPUT
          echo "tag=${SHORT_SHA}"          >> $GITHUB_OUTPUT
          echo "full=${REGISTRY}/${REPO}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -f docker/services/${{ matrix.service.name }}/Dockerfile \
            --build-arg ECR_REGISTRY=${{ steps.meta.outputs.registry }} \
            --build-arg BASE_TAG=base-latest \
            -t "${{ steps.meta.outputs.full }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            ${{ matrix.service.context }}

      - name: Push Docker image to ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "${{ steps.meta.outputs.full }}"
          docker push "${{ steps.meta.outputs.image }}:latest"
          echo "✅ Pushed ${{ matrix.service.name }}:${{ steps.meta.outputs.tag }} → ECR"

      - name: Export image tags as artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ steps.meta.outputs.tag }}" > /tmp/${{ matrix.service.name }}-tag.txt

      - name: Upload tag artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service.name }}-tag
          path: /tmp/${{ matrix.service.name }}-tag.txt
          retention-days: 1

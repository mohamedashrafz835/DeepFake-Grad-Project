name: CI/CD — Text Service

# ── Triggers ──────────────────────────────────────────────────────
# Triggered ONLY by the Lambda function (deepfake-mlops-router) via the GitHub Actions API
# (workflow_dispatch) when new text-service weights are uploaded to S3.
#
# Lambda parses the S3 key (text-service/<version>/model.pt),
# then calls: POST /repos/.../actions/workflows/text-service-deploy.yml/dispatches
# with inputs: service_name, model_version, s3_path
#
# Lambda does NOT trigger frontend-cicd.yml or api-gateway-cicd.yml.
on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service name (always text-service)"
        required: true
        default: "text-service"
      model_version:
        description: "Model version (e.g. v12)"
        required: true
      s3_path:
        description: "Full S3 path to the new model (e.g. s3://ml-models-deepfake-337205347153/text-service/v12/model.pt)"
        required: true

env:
  AWS_REGION: us-east-1
  SERVICE:    text-service

jobs:
  # ── 1. Build & Push new image to ECR ──────────────────────────────
  build:
    name: Build & Push text-service to ECR
    runs-on: ubuntu-latest

    outputs:
      ecr_registry: ${{ steps.ecr-login.outputs.registry }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          REGISTRY="337205347153.dkr.ecr.us-east-1.amazonaws.com"
          MODEL_TAG="${{ inputs.model_version }}"
          echo "image=${REGISTRY}/deepfake/text-service"              >> $GITHUB_OUTPUT
          echo "full=${REGISTRY}/deepfake/text-service:${MODEL_TAG}" >> $GITHUB_OUTPUT
          echo "tag=${MODEL_TAG}"                                      >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.full }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            ./Text_Service

      - name: Push Docker image to ECR
        run: |
          docker push "${{ steps.meta.outputs.full }}"
          docker push "${{ steps.meta.outputs.image }}:latest"
          echo "✅ Pushed text-service:${{ steps.meta.outputs.tag }} → ECR"

  # ── 2. Rolling deploy to both EC2s (sequentially) ─────────────────
  deploy:
    name: Deploy text-service to EC2 (${{ matrix.instance }})
    needs: build
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1   # EC2-1 fully health-checked before EC2-2 is touched
      matrix:
        include:
          - instance: EC2-1
            host: 18.208.200.130
          - instance: EC2-2
            host: 44.211.146.74

    steps:
      - name: Log deployment intent
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo " 🚀 Deploying: text-service"
          echo " 📦 Model version: ${{ inputs.model_version }}"
          echo " 🪣 S3 path:       ${{ inputs.s3_path }}"
          echo " 🖥️  Target:        ${{ matrix.instance }}"
          echo "═══════════════════════════════════════════════════════"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: SSH — Rolling deploy text-service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ matrix.host }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout:  180s
          script: |
            set -euo pipefail

            ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
            IMAGE="${ECR_REGISTRY}/deepfake/text-service:latest"
            S3_MODEL_PATH="${{ inputs.s3_path }}"
            PROD_PORT=8500
            TEMP_PORT=18500

            # Authenticate Docker with ECR
            aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
              | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            # Ensure docker network exists
            docker network inspect my-network >/dev/null 2>&1 \
              || docker network create my-network

            # Pull latest image (built with new code above)
            docker pull "${IMAGE}"

            # Start new container on temp port for health check
            echo "Starting new container on temp port ${TEMP_PORT}..."
            docker rm -f text-service-new 2>/dev/null || true
            docker run -d \
              --name text-service-new \
              --network my-network \
              -p "${TEMP_PORT}:8000" \
              --restart no \
              -e S3_MODEL_PATH="${S3_MODEL_PATH}" \
              -e AWS_DEFAULT_REGION="${{ env.AWS_REGION }}" \
              "${IMAGE}"

            # Health check loop
            HEALTHY=false
            for i in $(seq 1 12); do
              sleep 10
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 5 http://localhost:${TEMP_PORT}/health 2>/dev/null || echo "000")
              echo "  Attempt $i: HTTP $STATUS"
              if [[ "$STATUS" == "200" ]]; then
                HEALTHY=true
                break
              fi
            done

            if [[ "$HEALTHY" != "true" ]]; then
              echo "❌ Health check failed — rolling back"
              docker rm -f text-service-new
              exit 1
            fi

            echo "✅ New container is healthy — swapping into production..."
            docker rm -f text-service 2>/dev/null || true
            docker rm -f text-service-new

            docker run -d \
              --name text-service \
              --network my-network \
              -p "${PROD_PORT}:8000" \
              --restart unless-stopped \
              -e S3_MODEL_PATH="${S3_MODEL_PATH}" \
              -e AWS_DEFAULT_REGION="${{ env.AWS_REGION }}" \
              "${IMAGE}"

            sleep 5
            FINAL=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 http://localhost:${PROD_PORT}/health 2>/dev/null || echo "000")
            echo "Final health check: HTTP $FINAL"
            [[ "$FINAL" == "200" ]] && echo "✅ text-service deployed successfully" || exit 1

      - name: Notify success
        if: success()
        run: |
          echo "✅ text-service deployed to ${{ matrix.instance }}"
          echo "   Model: ${{ inputs.model_version }}"
          echo "   S3:    ${{ inputs.s3_path }}"

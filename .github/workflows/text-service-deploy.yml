name: CD — Deploy Text Service

# ── Triggers ──────────────────────────────────────────────────────
# 1. Manually (from GitHub UI)
# 2. Via Lambda workflow_dispatch API call (triggered by S3 upload)
on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service name (always text-service)"
        required: true
        default: "text-service"
      model_version:
        description: "Model version (e.g. v12)"
        required: true
      s3_path:
        description: "Full S3 path to the new model (e.g. s3://ml-models-.../text-service/v12/model.pt)"
        required: true

env:
  AWS_REGION:  us-east-1
  SERVICE:     text-service
  IMAGE_TAG:   latest           # could also use model_version as tag

jobs:
  # ── Deploy to both EC2 instances (sequentially for rolling deploy) ─
  deploy:
    name: Deploy text-service to EC2 (${{ matrix.instance }})
    runs-on: ubuntu-latest

    strategy:
      # IMPORTANT: max-parallel: 1 ensures true rolling deploy
      # EC2-1 is updated and health-checked before EC2-2 is touched
      max-parallel: 1
      matrix:
        include:
          - instance: EC2-1
            host_secret: EC2_1_HOST
          - instance: EC2-2
            host_secret: EC2_2_HOST

    steps:
      - name: Checkout (for rolling-deploy.sh)
        uses: actions/checkout@v4

      - name: Log deployment intent
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo " 🚀 Deploying: text-service"
          echo " 📦 Model version: ${{ inputs.model_version }}"
          echo " 🪣 S3 path:       ${{ inputs.s3_path }}"
          echo " 🖥️  Target:        ${{ matrix.instance }}"
          echo "═══════════════════════════════════════════════════════"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR (get fresh image tag)
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Copy rolling-deploy.sh to EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets[matrix.host_secret] }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout:  120s
          script: |
            set -euo pipefail

            # ── Write updated .env with latest ECR registry ─────
            ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
            echo "ECR_REGISTRY=${ECR_REGISTRY}" >> /opt/deepfake/.env

            # ── Copy deploy script (ensures latest version) ─────
            cat > /tmp/rolling-deploy.sh << 'SCRIPT'
            ${{ toJSON(steps.checkout.outputs) }}
            SCRIPT

            # Pull the script from the checked-out repo via SCP instead:
            # (The SSH action runs inline — we inline the script content)
            mkdir -p /opt/deepfake/scripts

            # ── Run rolling deploy ──────────────────────────────
            export AWS_REGION="${{ env.AWS_REGION }}"
            export ECR_REGISTRY="$ECR_REGISTRY"

            # Ensure deepfake-net docker network exists
            docker network inspect deepfake-net >/dev/null 2>&1 \
              || docker network create deepfake-net

            # Pull latest text-service image
            docker pull "${ECR_REGISTRY}/deepfake/text-service:${{ env.IMAGE_TAG }}"

            # Rolling deploy: temp port → health check → swap
            PROD_PORT=5001
            TEMP_PORT=15001
            IMAGE="${ECR_REGISTRY}/deepfake/text-service:${{ env.IMAGE_TAG }}"

            echo "Starting new container on temp port ${TEMP_PORT}..."
            docker rm -f deepfake-text-service-new 2>/dev/null || true
            docker run -d \
              --name deepfake-text-service-new \
              --network deepfake-net \
              -p "${TEMP_PORT}:${PROD_PORT}" \
              -e MODEL_CONFIG_S3_KEY="${{ inputs.s3_path }}" \
              -e AWS_DEFAULT_REGION="${AWS_REGION}" \
              --restart no \
              "$IMAGE"

            # Health check loop
            HEALTHY=false
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 5 http://localhost:${TEMP_PORT}/health 2>/dev/null || echo "000")
              echo "  Attempt $i: HTTP $STATUS"
              if [[ "$STATUS" == "200" ]]; then
                HEALTHY=true
                break
              fi
            done

            if [[ "$HEALTHY" != "true" ]]; then
              echo "❌ Health check failed — rolling back"
              docker rm -f deepfake-text-service-new
              exit 1
            fi

            echo "✅ New container is healthy — swapping..."
            docker rm -f deepfake-text-service 2>/dev/null || true
            docker rm -f deepfake-text-service-new

            docker run -d \
              --name deepfake-text-service \
              --network deepfake-net \
              -p "${PROD_PORT}:${PROD_PORT}" \
              -e MODEL_CONFIG_S3_KEY="${{ inputs.s3_path }}" \
              -e AWS_DEFAULT_REGION="${AWS_REGION}" \
              --restart unless-stopped \
              "$IMAGE"

            sleep 5
            FINAL=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 http://localhost:${PROD_PORT}/health 2>/dev/null || echo "000")
            echo "Final health check: HTTP $FINAL"
            [[ "$FINAL" == "200" ]] && echo "✅ text-service deployed successfully" || exit 1

      - name: Notify success
        if: success()
        run: |
          echo "✅ text-service deployed to ${{ matrix.instance }}"
          echo "   Model: ${{ inputs.model_version }}"
          echo "   S3:    ${{ inputs.s3_path }}"

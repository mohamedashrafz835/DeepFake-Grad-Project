name: CI/CD — Frontend

# ── Triggers ──────────────────────────────────────────────────────
# Triggered by code changes to the Frontend directory pushed to main.
# Also supports manual trigger via GitHub UI (workflow_dispatch).
#
# This workflow is NEVER triggered by the Lambda function.
# Lambda only triggers image-service-deploy.yml and text-service-deploy.yml.
on:
  push:
    branches: [main]
    paths:
      - "Frontend/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  SERVICE:    frontend

jobs:
  # ── 1. Build & Push to ECR ────────────────────────────────────────
  build:
    name: Build & Push frontend to ECR
    runs-on: ubuntu-latest

    outputs:
      ecr_registry: ${{ steps.ecr-login.outputs.registry }}
      image_tag:    ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          echo "tag=${SHORT_SHA}"                                   >> $GITHUB_OUTPUT
          echo "image=${REGISTRY}/deepfake/frontend"               >> $GITHUB_OUTPUT
          echo "full=${REGISTRY}/deepfake/frontend:${SHORT_SHA}"   >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.full }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            ./Frontend

      - name: Push Docker image to ECR
        run: |
          docker push "${{ steps.meta.outputs.full }}"
          docker push "${{ steps.meta.outputs.image }}:latest"
          echo "✅ Pushed frontend:${{ steps.meta.outputs.tag }} → ECR"

  # ── 2. Rolling deploy to both EC2s (sequentially) ─────────────────
  deploy:
    name: Deploy frontend to EC2 (${{ matrix.instance }})
    needs: build
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1   # EC2-1 fully health-checked before EC2-2 is touched
      matrix:
        include:
          - instance: EC2-1
            host_secret: EC2_1_HOST
          - instance: EC2-2
            host_secret: EC2_2_HOST

    steps:
      - name: Log deployment intent
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo " 🚀 Deploying: frontend"
          echo " 📝 Commit:    ${{ github.sha }}"
          echo " 🖥️  Target:    ${{ matrix.instance }}"
          echo "═══════════════════════════════════════════════════════"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: SSH — Rolling deploy frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets[matrix.host_secret] }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout:  120s
          script: |
            set -euo pipefail

            ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
            IMAGE="${ECR_REGISTRY}/deepfake/frontend:latest"
            PROD_PORT=3000
            TEMP_PORT=13000

            # Authenticate Docker with ECR
            aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
              | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            # Ensure docker network exists
            docker network inspect my-network >/dev/null 2>&1 \
              || docker network create my-network

            # Pull latest image
            docker pull "${IMAGE}"

            # Start new container on temp port for health check
            echo "Starting new container on temp port ${TEMP_PORT}..."
            docker rm -f frontend-new 2>/dev/null || true
            docker run -d \
              --name frontend-new \
              --network my-network \
              -p "${TEMP_PORT}:80" \
              --restart no \
              "${IMAGE}"

            # Health check loop
            HEALTHY=false
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 5 http://localhost:${TEMP_PORT}/ 2>/dev/null || echo "000")
              echo "  Attempt $i: HTTP $STATUS"
              if [[ "$STATUS" =~ ^[23] ]]; then
                HEALTHY=true
                break
              fi
            done

            if [[ "$HEALTHY" != "true" ]]; then
              echo "❌ Health check failed — rolling back"
              docker rm -f frontend-new
              exit 1
            fi

            echo "✅ New container is healthy — swapping into production..."
            docker rm -f frontend 2>/dev/null || true
            docker rm -f frontend-new

            docker run -d \
              --name frontend \
              --network my-network \
              -p "${PROD_PORT}:80" \
              --restart unless-stopped \
              "${IMAGE}"

            sleep 5
            FINAL=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 http://localhost:${PROD_PORT}/ 2>/dev/null || echo "000")
            echo "Final health check: HTTP $FINAL"
            [[ "$FINAL" =~ ^[23] ]] && echo "✅ frontend deployed successfully" || exit 1

      - name: Notify success
        if: success()
        run: echo "✅ frontend deployed to ${{ matrix.instance }} (commit ${{ github.sha }})"
